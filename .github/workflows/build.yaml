name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: cmake --preset windows-ci-x64

      - name: Build
        run: cmake --build --preset windows-ci-x64

      - name: Stage plugin layout
        shell: pwsh
        run: |
          $version = (Get-Content buildspec.json | ConvertFrom-Json).version
          "PLUGIN_VERSION=$version" | Out-File $env:GITHUB_ENV -Append
          $dll = Get-ChildItem build_x64 -Recurse -Filter obs-discordstatus.dll | Select-Object -First 1
          if (-not $dll) { throw "built DLL not found" }
          New-Item -ItemType Directory -Force `
            package/obs-plugins/64bit, `
            package/data/obs-plugins/obs-discordstatus/locale | Out-Null
          Copy-Item $dll.FullName package/obs-plugins/64bit/
          $pdb = [System.IO.Path]::ChangeExtension($dll.FullName, "pdb")
          if (Test-Path $pdb) { Copy-Item $pdb package/obs-plugins/64bit/ }
          Copy-Item data/locale/* package/data/obs-plugins/obs-discordstatus/locale/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: obs-discordstatus-${{ env.PLUGIN_VERSION }}-windows-x64
          path: package/*

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = "obs-discordstatus-$env:PLUGIN_VERSION-windows-x64.zip"
          Compress-Archive -Path package/* -DestinationPath $zip
          gh release create "${{ github.ref_name }}" $zip --generate-notes
